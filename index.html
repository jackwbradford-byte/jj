<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JJ AI Platform</title>
  <style>
    body{margin:0;font-family:system-ui,Arial,sans-serif;background:#0b1020;color:#e9ecff}
    header{padding:16px;border-bottom:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.03)}
    h1{margin:0;font-size:20px}
    .subtitle{margin:6px 0 0;color:rgba(233,236,255,.75)}
    main{max-width:900px;margin:0 auto;padding:16px}
    .chat{border-radius:14px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.03);overflow:hidden}
    .log{height:min(62vh,640px);overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
    .bubble{padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.15)}
    .bubble.user{align-self:flex-end;border-color:rgba(139,92,246,.4);background:rgba(139,92,246,.08)}
    .bubble.agent{align-self:flex-start;border-color:rgba(34,211,238,.35);background:rgba(34,211,238,.06)}
    form{display:flex;gap:10px;padding:12px;border-top:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.02)}
    input{flex:1;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.25);color:#e9ecff;padding:11px 12px;outline:none}
    button{border:0;border-radius:12px;padding:0 14px;background:linear-gradient(180deg,#9b65ff,#7c3aed);color:#fff;font-weight:700;cursor:pointer}
    .smallprint{padding:0 12px 12px;color:rgba(233,236,255,.7);font-size:12px}
  </style>
</head>
<body>
  <header>
    <h1>JJ</h1>
    <p class="subtitle">AI platform (demo fallback; connects to backend if configured)</p>
  </header>

  <main>
    <section class="chat">
      <div id="log" class="log" aria-live="polite"></div>
      <form id="form">
        <input id="msg" autocomplete="off" placeholder="Ask JJ anything..." required />
        <button type="submit">Send</button>
      </form>
      <div class="smallprint">
        JJ can make mistakes. Don’t share secrets. Backend calls are optional; if no backend is configured, JJ falls back to demo replies.
      </div>
    </section>
  </main>

  <script>
    const API_BASE = window.JJ_API_BASE || "";
    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const msg = document.getElementById("msg");

    function add(text, who) {
      const div = document.createElement("div");
      div.className = "bubble " + who;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    async function callBackend(user) {
      const res = await fetch(`${API_BASE}/api/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: user }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (!data?.reply) throw new Error("Bad backend response");
      return data.reply;
    }

    async function demoReply(user) {
      return `JJ (demo): I heard "${user}". Deploy the backend and set JJ_API_BASE to enable real AI.`;
    }

    async function getReply(user) {
      try {
        return await callBackend(user);
      } catch {
        return await demoReply(user);
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = msg.value.trim();
      if (!text) return;
      msg.value = "";
      add(text, "user");
      add("…thinking…", "agent");
      const placeholder = log.lastChild;
      try {
        placeholder.textContent = await getReply(text);
      } catch (err) {
        placeholder.textContent = "JJ is offline.";
      }
      msg.focus();
    });

    add("Hello — this is JJ. If the backend is deployed, JJ will call it; otherwise this is the demo fallback.", "agent");
  </script>
</body>
</html>
